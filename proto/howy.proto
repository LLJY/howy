// howy IPC protocol
//
// Wire format: 4-byte big-endian length prefix + serialized protobuf.
// Transport: Unix domain socket at /run/howy/howy.sock
//
// This file is the single source of truth for all IPC between:
//   - howyd   (daemon)
//   - pam_howy.so (PAM module)
//   - howy    (CLI tool)

syntax = "proto3";
package howy;

// ============================================================
// Top-level envelope messages
// ============================================================

// Client → Daemon request.
message Request {
  oneof cmd {
    AuthenticateReq   authenticate       = 1;
    EnrollReq         enroll             = 2;
    DetectReq         detect             = 3;
    PingReq           ping               = 4;
    InfoReq           info               = 5;
    ShutdownReq       shutdown           = 6;
    CheckCredentialReq  check_credential = 7;
    RevokeCredentialReq revoke_credential = 8;
    EnrollBatchReq    enroll_batch       = 9;
    EnrollmentPresenceReq enrollment_presence = 10;
    ListEnrollmentsReq list_enrollments = 11;
    RemoveEnrollmentReq remove_enrollment = 12;
    ClearEnrollmentsReq clear_enrollments = 13;
    ReloadStorageReq reload_storage = 14;
    SecurityInfoReq security_info = 15;
    // Versioned daemon-owned enrollment operations. Legacy tags 2 and 9 are
    // retained only so current daemons can reject old clients explicitly.
    EnrollV1Req enroll_v1 = 16;
    EnrollBatchV1Req enroll_batch_v1 = 17;
    BeginAuthV1Req begin_auth_v1 = 18;
    CommitAuthV1Req commit_auth_v1 = 19;
    CancelAuthV1Req cancel_auth_v1 = 20;
    AuthenticateV1Req authenticate_v1 = 21;
  }
}

// Daemon → Client response.
message Response {
  oneof result {
    AuthSuccess         success            = 1;
    AuthFailed          auth_failed        = 2;
    EnrollSuccess       enrolled           = 3;
    DetectResult        detected           = 4;
    Pong                pong               = 5;
    DaemonInfo          info               = 6;
    CredentialValid     credential_valid   = 7;
    CredentialInvalid   credential_invalid = 8;
    Error               error              = 9;
    EnrollBatchResult   enroll_batch_done  = 10;
    EnrollmentPresenceResult enrollment_presence = 11;
    ListEnrollmentsResult list_enrollments = 12;
    RemoveEnrollmentResult remove_enrollment = 13;
    ClearEnrollmentsResult clear_enrollments = 14;
    ReloadStorageResult reload_storage = 15;
    SecurityInfoResult security_info = 16;
    PromptRequiredV1 prompt_required_v1 = 17;
    AuthCancelledV1 auth_cancelled_v1 = 18;
  }
}

// ============================================================
// Request messages
// ============================================================

// Authenticate a user via face recognition.
// The daemon captures frames, detects faces, and matches
// against stored models for the given user.
message AuthenticateReq {
  string username = 1;
  // Timeout override in seconds. 0 = use daemon config default.
  uint32 timeout  = 2;
}

enum PromptOriginV1 {
  PROMPT_ORIGIN_V1_UNSPECIFIED = 0;
  PROMPT_ORIGIN_V1_LOCAL = 1;
  PROMPT_ORIGIN_V1_REMOTE = 2;
}

message PromptPolicyContextV1 {
  string pam_service = 1;
  reserved 2, 3;
  PromptOriginV1 origin = 4;
}

message BeginAuthV1Req {
  uint32 protocol_version = 1;
  string username = 2;
  reserved 3;
  bytes client_nonce = 4;
  PromptPolicyContextV1 policy = 5;
}

message CommitAuthV1Req {
  uint32 protocol_version = 1;
  bytes transaction_token = 2;
  bytes client_nonce = 3;
}

message CancelAuthV1Req {
  uint32 protocol_version = 1;
  bytes transaction_token = 2;
  bytes client_nonce = 3;
}

message AuthenticateV1Req {
  // Versioned prompt-off one-shot operation. Legacy daemons treat top-level
  // tag 21 as unknown before they can dispatch authentication or camera work.
  uint32 protocol_version = 1;
  string username = 2;
  uint32 timeout = 3;
}

// Enroll a new face model for a user. Capture, inference, and persistence stay
// daemon-owned; the response contains metadata only.
message EnrollReq {
  string username = 1;
  // Human-readable label (e.g. "laptop IR", "office webcam").
  string label    = 2;
  reserved 3;
}

// Version 1 daemon-owned live enrollment. The distinct top-level operation tag
// makes this request unknown to legacy daemons before they can open a camera.
message EnrollV1Req {
  string username = 1;
  string label = 2;
}

// Detect faces in a single raw frame (for testing/preview).
message DetectReq {
  // Raw BGR pixel data.
  bytes  frame   = 1;
  // Frame height in pixels.
  uint32 height  = 2;
  // Frame width in pixels.
  uint32 width   = 3;
}

// Health check.
message PingReq {}

// Request daemon status info.
message InfoReq {}

// Request graceful shutdown (requires root).
message ShutdownReq {}

// Check if a cached credential is valid for a user.
message CheckCredentialReq {
  string username   = 1;
}

// Revoke a cached credential for a user session.
message RevokeCredentialReq {
  string username   = 1;
  string session_id = 2;
}

// Process a batch of enrollment frames from a session directory.
// The daemon reads images from the directory, detects faces, computes
// embeddings, and returns results for each frame.
message EnrollBatchReq {
  string username    = 1;
  // Path to the session directory containing frame images.
  string session_dir = 2;
  // Human-readable label for this enrollment session.
  string label       = 3;
}

// Version 1 daemon-owned batch enrollment. The distinct top-level operation
// tag makes this request unknown to legacy daemons before directory traversal.
message EnrollBatchV1Req {
  string username = 1;
  string session_dir = 2;
  string label = 3;
}

// Check whether a user has a candidate enrollment record. This is authorized
// for root or the matching UID and never returns enrollment metadata.
message EnrollmentPresenceReq {
  string username = 1;
}

// Root-only metadata listing.
message ListEnrollmentsReq {
  string username = 1;
}

// Root-only stable-ID removal guarded by the generation returned by list.
message RemoveEnrollmentReq {
  string username = 1;
  bytes enrollment_id = 2;
  uint64 expected_generation = 3;
}

// Root-only clear guarded by the generation returned by list.
message ClearEnrollmentsReq {
  string username = 1;
  uint64 expected_generation = 2;
}

// Root-only storage revalidation.
message ReloadStorageReq {}

// Root-only security diagnostics.
message SecurityInfoReq {}

// ============================================================
// Response messages
// ============================================================

// Authentication succeeded.
message AuthSuccess {
  // Index of the matched face model.
  uint32 model_index = 1;
  // Model label.
  string model_label = 2;
  // Cosine similarity score.
  float  score       = 3;
  // Total recognition time in milliseconds.
  double elapsed_ms  = 4;
}

// Authentication failed (timeout or no match).
message AuthFailed {
  // Best similarity score achieved (below threshold).
  float  best_score       = 1;
  // Number of camera frames processed.
  uint32 frames_processed = 2;
  // Human-readable failure reason.
  string reason           = 3;
}

message PromptRequiredV1 {
  uint32 protocol_version = 1;
  bytes transaction_token = 2;
  bytes client_nonce = 3;
  uint32 prompt_timeout_ms = 4;
  uint32 commit_response_timeout_ms = 5;
}

message AuthCancelledV1 {
  uint32 protocol_version = 1;
  bytes client_nonce = 2;
}

// Face enrollment succeeded.
message EnrollSuccess {
  reserved 1;
  // Face detection confidence score.
  float det_score          = 2;
  // Stable, nonzero 16-byte enrollment identifier.
  bytes enrollment_id      = 3;
  // Generation committed by the daemon.
  uint64 generation        = 4;
  // Total enrollments after commit.
  uint32 total_count       = 5;
  // Confirms daemon-owned storage enrollment semantics.
  uint32 enrollment_protocol_version = 6;
}

// Face detection result (for testing/preview). Contains detection metadata only.
message DetectResult {
  repeated DetectedFace faces = 1;
  double elapsed_ms           = 2;
}

// A single detected face.
message DetectedFace {
  // Former ArcFace embedding field. Reserved so diagnostic IPC can never reuse it.
  reserved 7;
  // Bounding box: x1, y1, x2, y2 in pixels.
  int32 x1 = 1;
  int32 y1 = 2;
  int32 x2 = 3;
  int32 y2 = 4;
  // 5-point landmarks: [lx0,ly0, lx1,ly1, ..., lx4,ly4].
  repeated float landmarks = 5;
  // Detection confidence.
  float score = 6;
}

// Pong response to health check.
message Pong {}

// Daemon status information.
message DaemonInfo {
  // Active execution provider name.
  string provider        = 1;
  // Retained for wire compatibility. Public status always leaves this empty.
  string detector_model  = 2;
  // Retained for wire compatibility. Public status always leaves this empty.
  string recognizer_model = 3;
  // Embedding dimensionality (512 for ArcFace).
  uint32 embedding_dim   = 4;
  // Daemon uptime in seconds.
  uint64 uptime_secs     = 5;
  // Stable numeric embedding storage mode (0, 1, 2, or reserved 3).
  uint32 active_security_mode = 6;
  // Whether clients must use the future prompt transaction before capture.
  bool prompt_required = 7;
  // Whether the active storage mode is currently available to the daemon.
  bool storage_ready = 8;
}

// Cached credential is valid — face scan can be skipped.
message CredentialValid {}

// Cached credential is not valid or not found.
message CredentialInvalid {}

// Error response.
message Error {
  string message = 1;
  // Stable machine-readable category. Empty for legacy/general errors.
  string code = 2;
}

// Result of batch enrollment processing.
message EnrollBatchResult {
  // Number of frames found in the session directory.
  uint32 frames_found     = 1;
  // Number of frames where a face was detected and embedding computed.
  uint32 frames_accepted  = 2;
  // Number of frames rejected (no face, multiple faces, etc).
  uint32 frames_rejected  = 3;
  // Total processing time in milliseconds.
  double elapsed_ms       = 4;
  // Human-readable per-frame rejection reasons (frame_name: reason).
  repeated string rejection_details = 5;
  // Generation committed by the daemon, or the captured generation if none accepted.
  uint64 generation = 6;
  // Total enrollments after processing.
  uint32 total_count = 7;
}

message EnrollmentPresenceResult {
  bool candidate = 1;
  reserved 2;
}

message EnrollmentMetadataEntry {
  bytes enrollment_id = 1;
  string label = 2;
  uint64 created_unix_seconds = 3;
}

message ListEnrollmentsResult {
  uint64 generation = 1;
  repeated EnrollmentMetadataEntry entries = 2;
}

message RemoveEnrollmentResult {
  uint64 generation = 1;
  bytes removed_enrollment_id = 2;
}

message ClearEnrollmentsResult {
  // Always 0 after a successful clear.
  uint64 generation = 1;
  uint32 removed_count = 2;
}

message ReloadStorageResult {
  bool storage_ready = 1;
  uint32 candidate_records = 2;
  uint32 mode_mismatch_records = 3;
  uint32 key_mismatch_records = 4;
  uint32 model_mismatch_records = 5;
  uint32 corrupt_records = 6;
}

message NamespaceDiagnostic {
  uint32 mode = 1;
  string path = 2;
  bool active = 3;
  bool implemented = 4;
}

enum SecurityBackendStateV1 {
  SECURITY_BACKEND_STATE_V1_UNSPECIFIED = 0;
  SECURITY_BACKEND_STATE_V1_READY = 1;
  SECURITY_BACKEND_STATE_V1_UNAVAILABLE = 2;
}

enum SecurityReadinessStateV1 {
  SECURITY_READINESS_STATE_V1_UNSPECIFIED = 0;
  SECURITY_READINESS_STATE_V1_READY = 1;
  SECURITY_READINESS_STATE_V1_UNAVAILABLE = 2;
}

enum SecurityPoisonStateV1 {
  SECURITY_POISON_STATE_V1_UNSPECIFIED = 0;
  SECURITY_POISON_STATE_V1_NOT_POISONED = 1;
  SECURITY_POISON_STATE_V1_POISONED = 2;
}

message SecurityInfoResult {
  string detector_model = 1;
  string recognizer_model = 2;
  uint32 active_security_mode = 3;
  uint64 key_epoch = 4;
  bool storage_ready = 5;
  bool prompt_required = 6;
  repeated NamespaceDiagnostic namespaces = 7;
  // SHA-256 of the exact raw bytes parsed from the retained config descriptor.
  string config_sha256 = 8;
  // Present only for a live encrypted mode that consumed this exact credential.
  string credential_name = 9;
  // Nonsecret source path configured by the unit-provided companion; this is
  // not a claim that the daemon observed or parsed the encrypted envelope.
  string configured_credential_source = 10;
  SecurityBackendStateV1 backend_state = 11;
  SecurityReadinessStateV1 readiness_state = 12;
  SecurityPoisonStateV1 poison_state = 13;
  string daemon_invocation_id = 14;
  string daemon_version = 15;
  string build_identity = 16;
  string binary_absolute_path = 17;
  string binary_sha256 = 18;
}
